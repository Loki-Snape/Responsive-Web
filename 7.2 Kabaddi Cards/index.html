<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn Modern JavaScript methods by building Kabaddi team cards</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="title">Kabaddi Team Stats</h1>
    <main>
      <div class="team-stats">
        <p>Team: <span id="team"></span></p>
        <p>Sport: <span id="sport"></span></p>
        <p>Year: <span id="year"></span></p>
        <p>Head coach: <span id="head-coach"></span></p>
      </div>
      <label class="options-label" for="players">Filter Players:</label>
      <select name="players" id="players">
        <option value="all">All Players</option>
        <option value="nickname">Nicknames</option>
        <option value="raider">Raiders</option>
        <option value="defender">Defenders</option>
        <option value="all-rounder">All-Rounders</option>
      </select>
      <div class="cards" id="player-cards">
        </div>
    </main>
    <footer>&copy; Kabaddi League</footer>
    <script src="./script.js"></script>
  </body>
</html>
